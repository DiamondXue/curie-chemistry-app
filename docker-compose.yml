version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Backend  —  Node.js / Express  (port 4000)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: curie_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      DB_PATH: /app/data/curie.db
    expose:
      - "4000"
    volumes:
      - curie_db:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - curie_net

  # ─────────────────────────────────────────────
  # Frontend  —  React/Vite → Nginx  (port 80)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: curie_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - curie_net

networks:
  curie_net:
    driver: bridge

volumes:
  curie_db:
    driver: local
